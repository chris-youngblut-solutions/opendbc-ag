name: Consistency

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scope-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Enforce pure-standard PGN policy (reject 0xEF00 + 0xFF00..0xFFFF)
        run: |
          python -c "
          from pathlib import Path
          from canmatrix import formats
          violations = []
          for dbc in Path('opendbc_ag/dbc').glob('*.dbc'):
              m = formats.loadp(str(dbc))
              mat = list(m.values())[0]
              for frame in mat.frames:
                  pgn = frame.arbitration_id.id
                  if pgn == 0xEF00 or 0xFF00 <= pgn <= 0xFFFF:
                      violations.append(f'{dbc.name}: {frame.name} (PGN 0x{pgn:X}) is in proprietary range')
          if violations:
              print('CI FAIL: proprietary-range PGNs found in DBC corpus.')
              for v in violations:
                  print(f'  {v}')
              raise SystemExit(1)
          print('OK: no proprietary-range PGNs in DBC corpus.')
          "

      - name: Detect cross-DBC duplicate PGN IDs
        run: |
          python -c "
          from collections import defaultdict
          from pathlib import Path
          from canmatrix import formats
          seen = defaultdict(list)
          for dbc in sorted(Path('opendbc_ag/dbc').glob('*.dbc')):
              m = formats.loadp(str(dbc))
              mat = list(m.values())[0]
              for frame in mat.frames:
                  seen[frame.arbitration_id.id].append((dbc.name, frame.name))
          dupes = {pgn: locs for pgn, locs in seen.items() if len(locs) > 1}
          if dupes:
              print('CI WARN: duplicate PGN IDs across DBC files (expected zero):')
              for pgn, locs in sorted(dupes.items()):
                  print(f'  0x{pgn:X}: {locs}')
              raise SystemExit(1)
          print(f'OK: {sum(len(v) for v in seen.values())} frames across {len(seen)} unique PGN IDs — no duplicates.')
          "
